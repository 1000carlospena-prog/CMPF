databases:
  - name: cmpf-db
    databaseName: cmpf
    plan: free
    region: ohio

services:
  - type: web
    name: cmpf
    runtime: python
    region: ohio
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py seed_data && python manage.py list_users
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: cmpf-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "4"
      # Email con console backend: el codigo aparece en Render Logs
      - key: DJANGO_EMAIL_BACKEND
        value: console
      # Para enviar emails reales, descomenta y configura SendGrid:
      # - key: DJANGO_EMAIL_BACKEND
      #   value: django.core.mail.backends.smtp.EmailBackend
      # - key: EMAIL_HOST
      #   value: smtp.sendgrid.net
      # - key: EMAIL_PORT
      #   value: "587"
      # - key: EMAIL_HOST_USER
      #   value: apikey
      # - key: EMAIL_HOST_PASSWORD
      #   sync: false    # Poner el API key de SendGrid en el dashboard
      # - key: DEFAULT_FROM_EMAIL
      #   value: tunombreverificado@ejemplo.com
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: noreply@cmpf.com
