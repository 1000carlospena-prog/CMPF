{% extends "base.html" %}
{% load static %}
{% block title %}Mi Perfil - CMPF{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
  <div class="card">
    <h2 style="margin-bottom: 20px;">Editar mi perfil</h2>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label>Nombre real</label>
        <input type="text" name="nombre_real" value="{{ user.profile.nombre_real }}" placeholder="Tu nombre real">
      </div>
      <div class="form-group">
        <label>Foto de perfil</label>
        {% if user.profile.avatar %}
          <div style="margin-bottom: 8px;">
            <img src="{{ user.profile.avatar.url }}" alt="" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">
          </div>
        {% endif %}
        <input type="file" name="avatar" accept="image/*">
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{% url 'perfil_usuario' user.id %}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
