{% extends "base.html" %}
{% block title %}Recuperar Contraseña - CMPF{% endblock %}
{% block content %}
<div style="max-width: 420px; margin: 40px auto;">
    <div class="card">
        <div style="text-align:center;margin-bottom:20px;">
            <h1 style="font-size:1.6rem;">Recuperar contraseña</h1>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="tucorreo@gmail.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Enviar código</button>
        </form>

        <div style="text-align:center;margin-top:16px;font-size:0.9rem;">
            <a href="{% url 'login' %}" style="color:#2563eb;">Volver a inicio de sesión</a>
        </div>
    </div>
</div>
{% endblock %}
