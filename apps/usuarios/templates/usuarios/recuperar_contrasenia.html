{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - CMPF</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: white;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo h1 { font-size: 2.5rem; font-weight: 800; color: #0f3460; text-align: center; }
        .logo h1 span { color: #e94560; }
        .logo p { color: #6c757d; font-size: 0.95rem; text-align: center; margin-top: 5px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #343a40; font-size: 0.9rem; }
        .form-group input {
            width: 100%; padding: 12px 16px; border: 2px solid #dee2e6; border-radius: 8px;
            font-size: 1rem; transition: all 0.3s ease; font-family: inherit;
        }
        .form-group input:focus {
            outline: none; border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.15);
        }
        .btn {
            width: 100%; padding: 14px; background: #0f3460; color: white; border: none;
            border-radius: 8px; font-size: 1.05rem; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; margin-top: 10px;
        }
        .btn:hover {
            background: #1a4a7a; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(15, 52, 96, 0.3);
        }
        .alert {
            padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-weight: 500;
        }
        .alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .footer-text { text-align: center; margin-top: 20px; color: #6c757d; font-size: 0.9rem; }
        .footer-text a { color: #0f3460; text-decoration: none; font-weight: 600; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><h1>CMPF <span>·</span></h1><p>Recuperar contraseña</p></div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="tucorreo@gmail.com" required autofocus>
            </div>
            <button type="submit" class="btn">Enviar código</button>
        </form>

        <div class="footer-text">
            <p><a href="{% url 'login' %}">Volver a inicio de sesión</a></p>
        </div>
    </div>
</body>
</html>
