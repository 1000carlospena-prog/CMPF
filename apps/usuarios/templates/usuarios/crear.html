{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Usuario - CMPF</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/productos.css' %}">
</head>
<body>
    <div class="contenedor">
        <h1>➕ Nuevo Usuario</h1>

        <div style="background: white; border-radius: var(--radius); padding: 30px; box-shadow: var(--shadow);">
            <form method="post">
                {% csrf_token %}

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Usuario *</label>
                    <input type="text" name="username" placeholder="Nombre de usuario" required style="width: 100%; padding: 10px 14px; border: 2px solid var(--gray-300); border-radius: 8px; font-size: 1rem;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Email</label>
                    <input type="email" name="email" placeholder="correo@ejemplo.com" style="width: 100%; padding: 10px 14px; border: 2px solid var(--gray-300); border-radius: 8px; font-size: 1rem;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Contraseña *</label>
                    <input type="password" name="password" placeholder="••••••••" required style="width: 100%; padding: 10px 14px; border: 2px solid var(--gray-300); border-radius: 8px; font-size: 1rem;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Confirmar Contraseña *</label>
                    <input type="password" name="password2" placeholder="••••••••" required style="width: 100%; padding: 10px 14px; border: 2px solid var(--gray-300); border-radius: 8px; font-size: 1rem;">
                </div>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-weight: 600; margin-bottom: 5px;">Grado</label>
                    <select name="grado" style="width: 100%; padding: 10px 14px; border: 2px solid var(--gray-300); border-radius: 8px; font-size: 1rem; background: white;">
                        {% for val, label in grados %}
                            <option value="{{ val }}" {% if val == 'v4' %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 25px;">
                    <button type="submit" class="btn btn-primary" style="padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;">💾 Crear Usuario</button>
                    <a href="{% url 'usuarios:lista' %}" class="btn btn-secondary" style="padding: 12px 30px; background: var(--gray-500); color: white; border-radius: 8px; text-decoration: none; font-weight: 600;">↩ Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
