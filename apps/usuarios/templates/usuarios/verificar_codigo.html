{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código - CMPF</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 440px;
            width: 100%;
            background: white;
            padding: 40px 35px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo h1 { font-size: 2.5rem; font-weight: 800; color: #0f3460; }
        .logo h1 span { color: #e94560; }
        .logo p { color: #6c757d; font-size: 0.95rem; margin-top: 5px; }
        .icon-email { font-size: 3rem; margin: 20px 0; }
        .info { color: #6c757d; font-size: 0.9rem; margin-bottom: 20px; }
        .code-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1.8rem;
            text-align: center;
            letter-spacing: 10px;
            font-weight: 700;
            transition: all 0.3s ease;
            font-family: monospace;
        }
        .code-input:focus {
            outline: none;
            border-color: #0f3460;
            box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.15);
        }
        .btn-verify {
            width: 100%;
            padding: 14px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        .btn-verify:hover {
            background: #1a4a7a;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(15, 52, 96, 0.3);
        }
        .btn-resend {
            background: none;
            border: 2px solid #dee2e6;
            color: #6c757d;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-resend:hover {
            border-color: #0f3460;
            color: #0f3460;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .alert-success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>CMPF <span>·</span></h1>
            <p>Verifica tu correo</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="icon-email">✉️</div>
        <p class="info">Hemos enviado un código de 6 dígitos a <strong>{{ email }}</strong></p>

        <form method="post">
            {% csrf_token %}
            <input type="text" name="codigo" class="code-input" maxlength="6" placeholder="000000" required autofocus>
            <button type="submit" class="btn-verify">Verificar Código</button>
        </form>

        <form method="post" action="{% url 'reenviar_codigo' %}">
            {% csrf_token %}
            <button type="submit" class="btn-resend">Reenviar código</button>
        </form>
    </div>
</body>
</html>
