{% extends "base.html" %}
{% block title %}Editar {{ usuario.username }} - CMPF{% endblock %}
{% block content %}
<h1>Editar Usuario: {{ usuario.username }}</h1>

<div class="card" style="max-width:600px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" name="username" value="{{ usuario.username }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ usuario.email }}">
        </div>
        <div class="form-group">
            <label>Nombre real</label>
            <input type="text" name="nombre_real" value="{{ usuario.profile.nombre_real }}">
        </div>
        <div class="form-group">
            <label>Nueva contraseña (dejar vacío para no cambiar)</label>
            <input type="password" name="password" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label>Grado</label>
            <select name="grado">
                {% for val, label in grados %}
                    <option value="{{ val }}" {% if usuario.profile.grado == val %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            <a href="{% url 'usuarios:detalle' usuario.id %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
