{% extends "base.html" %}
{% block title %}Eliminar {{ object.nombre }} - CMPF{% endblock %}
{% block content %}
<div style="max-width:500px;margin:40px auto;text-align:center;">
    <div class="card">
        <div style="font-size:3rem;margin-bottom:16px;">⚠️</div>
        <h1 style="font-size:1.4rem;color:#ef4444;margin-bottom:12px;">Eliminar Producto</h1>
        <p>Estás a punto de eliminar <strong>{{ object.nombre }}</strong>.</p>
        <p style="color:#94a3b8;font-size:0.85rem;margin-top:4px;">Esta acción no se puede deshacer.</p>

        <form method="post" style="margin-top:20px;">
            {% csrf_token %}
            <div style="display:flex;gap:10px;justify-content:center;">
                <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                <a href="{% url 'productos:lista_productos' %}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
