{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar {{ object.nombre }} - CMPF</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/productos.css' %}">
</head>
<body>
    <div class="contenedor contenedor-small text-center">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
            <h1 style="border-bottom: none; margin-bottom: 0; color: var(--danger); border-bottom: 3px solid var(--danger);">⚠️ Eliminar</h1>
            <a href="{% url 'home' %}" class="btn btn-volver" style="background: var(--primary); color: white; padding: 8px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; transition: var(--transition);">
                🏠 Inicio
            </a>
        </div>

        <span class="icono-grande">⚠️</span>

        <p>Estás a punto de eliminar <strong class="texto-destacado">{{ object.nombre }}</strong>.</p>
        <p class="texto-muted">Esta acción no se puede deshacer.</p>

        <form method="post">
            {% csrf_token %}
            <div class="btn-group btn-group-center">
                <button type="submit" class="btn btn-eliminar">🗑️ Sí, eliminar</button>
                <a href="{% url 'productos:lista_productos' %}" class="btn btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>
</body>
</html>
