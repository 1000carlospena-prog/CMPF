{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.titulo }} - CMPF Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a1a; color: white; line-height: 1.8; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .back-link { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; display: inline-block; }
        .back-link:hover { color: white; }
        .meta { color: rgba(255,255,255,0.4); font-size: 0.9rem; margin-bottom: 20px; }
        .meta span { margin-right: 15px; }
        h1 { font-size: 2.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
        .featured-image { width: 100%; max-height: 400px; object-fit: cover; border-radius: 16px; margin-bottom: 30px; }
        .content { font-size: 1.05rem; color: rgba(255,255,255,0.85); }
        .content p { margin-bottom: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <a href="{% url 'blog:lista' %}" class="back-link">← Volver al Blog</a>
        <div class="meta">
            <span>{{ post.creado|date:"d F Y" }}</span>
            {% if post.autor %}<span>Por {{ post.autor.username }}</span>{% endif %}
        </div>
        <h1>{{ post.titulo }}</h1>
        {% if post.imagen %}<img src="{{ post.imagen.url }}" alt="{{ post.titulo }}" class="featured-image">{% endif %}
        <div class="content">
            {{ post.contenido|linebreaks }}
        </div>
    </div>
</body>
</html>
