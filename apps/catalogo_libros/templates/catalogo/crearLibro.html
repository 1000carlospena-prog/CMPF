{% extends "catalogo/base.html" %}
{% load static %}

{% block sub_title %}Registrar Nuevo Libro - CMPF{% endblock %}

{% block lib_content %}
<div class="card" style="max-width: 720px; margin: 0 auto;">
    <div class="card-header">
        <h2 style="margin: 0;">Registrar Nuevo Libro</h2>
    </div>
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data" novalidate>
            {% csrf_token %}

            <div class="form-group">
                <label for="id_nombre">Título del libro</label>
                <input type="text" name="nombre" id="id_nombre" required>
            </div>
            <div class="form-group">
                <label for="id_autor">Autor</label>
                <input type="text" name="autor" id="id_autor" required>
            </div>
            <div class="form-group">
                <label for="id_genero">Género</label>
                <input type="text" name="genero" id="id_genero">
            </div>
            <div class="form-group">
                <label for="id_precio">Precio</label>
                <input type="number" name="precio" id="id_precio" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="id_sinopsis">Sinopsis</label>
                <textarea name="sinopsis" id="id_sinopsis" rows="4"></textarea>
            </div>
            <div class="form-group">
                <label for="id_imagen">Portada</label>
                <input type="file" name="imagen" id="id_imagen" accept="image/*">
            </div>

            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 20px;">
                <button type="submit" name="action" value="guardar" class="btn btn-success">💾 Guardar Libro</button>
                <a href="{% url 'listalibros' %}" class="btn btn-secondary">↻ Volver al catálogo</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
