{% extends "base.html" %}
{% block title %}Contacto - CMPF{% endblock %}
{% block content %}
<h1>Contacto</h1>
<p style="color:#64748b;margin-bottom:24px;">¿Tienes alguna pregunta o sugerencia? Escríbenos.</p>

<div class="card" style="max-width:600px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" required>
        </div>
        <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Mensaje</label>
            <textarea name="mensaje" style="min-height:150px;resize:vertical;" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Enviar Mensaje</button>
    </form>
</div>
{% endblock %}
