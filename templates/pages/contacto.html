{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - CMPF</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a1a; color: white; }
        .container { max-width: 700px; margin: 0 auto; padding: 40px 20px; }
        .back-link { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem; margin-bottom: 20px; display: inline-block; }
        .back-link:hover { color: white; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.5); margin-bottom: 30px; }
        .contact-form { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 30px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; font-size: 1rem; font-family: inherit;
        }
        .form-group textarea { resize: vertical; min-height: 150px; }
        .btn-submit { width: 100%; padding: 16px; border: none; border-radius: 12px; background: #e94560; color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.3s; font-family: inherit; }
        .btn-submit:hover { background: #c73652; transform: translateY(-2px); }
        .message { padding: 12px 20px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9rem; }
        .message.success { background: rgba(45,106,79,0.3); border: 1px solid #2d6a4f; }
        .message.error { background: rgba(233,69,96,0.3); border: 1px solid #e94560; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Inicio</a>
        <h1>Contacto</h1>
        <p class="subtitle">¿Tienes alguna pregunta o sugerencia? Escríbenos.</p>

        {% if messages %}
            {% for msg in messages %}
            <div class="message {{ msg.tags }}">{{ msg }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" class="contact-form">
            {% csrf_token %}
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="nombre" required>
            </div>
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Mensaje</label>
                <textarea name="mensaje" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Enviar Mensaje</button>
        </form>
    </div>
</body>
</html>
